<!DOCTYPE html>
<html>
    <body>
        <h2>JavaScript Callback Demo</h2>
    </body>
    <script>
        function greeting(name) {
            alert(`Hi ${name}, nice to meet you!`);
        }

        function processUserInput(callback) {
            const name = prompt("Enter your name here:");
            callback(name);
        }

        processUserInput(greeting);
    </script>
</html>
